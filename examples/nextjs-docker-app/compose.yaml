services:
  app:
    build:
      context: .
    image: nextjs-docker-app:kelas
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      APP_ENV: compose
      APP_VERSION: 0.1.0
      NEXT_PUBLIC_APP_MESSAGE: "Dijalankan dari Docker Compose"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
